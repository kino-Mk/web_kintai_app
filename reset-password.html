<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>パスワード再設定 - 勤怠管理システム</title>
    <link rel="icon" href="images/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#ffffff">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        /* ページ固有のスタイル */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f7fa;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .reset-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .reset-container h1 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #333;
        }

        .reset-container p {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 20px;
        }

        .reset-container input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .reset-container input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #0056b3;
        }

        .btn-reset:disabled {
            background: #a0c4ff;
            cursor: not-allowed;
        }

        .status-box {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-loading {
            background: #e2e3e5;
            color: #383d41;
        }

        .lock-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #007bff;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <!-- 読み込み中 -->
        <div id="view-loading">
            <div class="lock-icon">🔐</div>
            <h1>パスワード再設定</h1>
            <div class="status-box status-loading">トークンを確認中...</div>
        </div>

        <!-- トークンエラー -->
        <div id="view-error" class="hidden">
            <div class="lock-icon">⚠️</div>
            <h1>リンクが無効です</h1>
            <div id="error-message" class="status-box status-error">
                このリンクは無効または有効期限切れです。
            </div>
            <a href="index.html" class="back-link">← トップページに戻る</a>
        </div>

        <!-- パスワード入力フォーム -->
        <div id="view-form" class="hidden">
            <div class="lock-icon">🔑</div>
            <h1>新しいパスワードを設定</h1>
            <p id="reset-emp-info"></p>
            <input type="password" id="new-password" placeholder="新しいパスワード" autofocus>
            <input type="password" id="confirm-password" placeholder="パスワード（確認）">
            <div id="form-error" class="status-box status-error hidden"></div>
            <button id="btn-update-password" class="btn-reset">パスワードを更新</button>
        </div>

        <!-- 完了 -->
        <div id="view-success" class="hidden">
            <div class="lock-icon">✅</div>
            <h1>パスワードを更新しました</h1>
            <p>新しいパスワードでログインできます。</p>
            <a href="index.html" class="back-link">← トップページに戻る</a>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // URLからトークンを取得
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // 表示切替用のヘルパー
        function showView(viewId) {
            ['view-loading', 'view-error', 'view-form', 'view-success'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        // トークン検証
        async function validateToken() {
            if (!token) {
                document.getElementById('error-message').textContent = 'トークンが指定されていません。メールのリンクからアクセスしてください。';
                showView('view-error');
                return;
            }

            try {
                // Firestoreからトークンを検索
                const snapshot = await db.collection('passwordResetTokens')
                    .where('token', '==', token)
                    .limit(1)
                    .get();

                if (snapshot.empty) {
                    document.getElementById('error-message').textContent = 'このリンクは無効です。新しいリセットリンクを申請してください。';
                    showView('view-error');
                    return;
                }

                const tokenDoc = snapshot.docs[0];
                const tokenData = tokenDoc.data();

                // 有効期限チェック (1時間)
                const expiresAt = tokenData.expiresAt.toDate();
                if (new Date() > expiresAt) {
                    // 期限切れのトークンを削除
                    await tokenDoc.ref.delete();
                    document.getElementById('error-message').textContent = 'このリンクの有効期限が切れています（1時間）。新しいリセットリンクを申請してください。';
                    showView('view-error');
                    return;
                }

                // 従業員情報を表示
                const empDoc = await db.collection('employees').doc(tokenData.empId).get();
                if (empDoc.exists) {
                    const emp = empDoc.data();
                    document.getElementById('reset-emp-info').textContent = `${emp.name} (${emp.id}) さんのパスワードを再設定します`;
                }

                // フォーム表示
                showView('view-form');

                // パスワード更新処理
                document.getElementById('btn-update-password').addEventListener('click', async () => {
                    const newPass = document.getElementById('new-password').value;
                    const confirmPass = document.getElementById('confirm-password').value;
                    const formError = document.getElementById('form-error');
                    const updateBtn = document.getElementById('btn-update-password');

                    // バリデーション
                    if (!newPass) {
                        formError.textContent = 'パスワードを入力してください。';
                        formError.classList.remove('hidden');
                        return;
                    }
                    if (newPass !== confirmPass) {
                        formError.textContent = 'パスワードが一致しません。';
                        formError.classList.remove('hidden');
                        return;
                    }

                    updateBtn.disabled = true;
                    updateBtn.textContent = '更新中...';
                    formError.classList.add('hidden');

                    try {
                        // パスワードを更新
                        await db.collection('employees').doc(tokenData.empId).update({
                            password: newPass
                        });

                        // 使用済みトークンを削除
                        await tokenDoc.ref.delete();

                        // 完了画面を表示
                        showView('view-success');
                    } catch (error) {
                        console.error('Password update error:', error);
                        formError.textContent = 'パスワードの更新に失敗しました: ' + error.message;
                        formError.classList.remove('hidden');
                        updateBtn.disabled = false;
                        updateBtn.textContent = 'パスワードを更新';
                    }
                });

                // Enterキー対応
                document.getElementById('confirm-password').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        document.getElementById('btn-update-password').click();
                    }
                });

            } catch (error) {
                console.error('Token validation error:', error);
                document.getElementById('error-message').textContent = 'エラーが発生しました: ' + error.message;
                showView('view-error');
            }
        }

        // ページ読み込み時にトークン検証を実行
        validateToken();
    </script>
</body>

</html>
