<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>パスワード再設定へ転送中...</title>
    <script>
        // 古いGitHub Pagesの reset-password.html に来たアクセスを、
        // 新しい Firebase Hosting のSPAルーティング (?token=...) へ転送する
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (token) {
            window.location.replace('https://kintai-f2c7f.web.app/?token=' + encodeURIComponent(token));
        } else {
            window.location.replace('https://kintai-f2c7f.web.app/');
        }
    </script>
</head>

<body>
    <p>新しいシステムへ転送しています...</p>
</body>

</html>
